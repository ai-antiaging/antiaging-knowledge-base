<header>
    <h1>{{ .Site.Title }}</h1>
    <p>{{ .Site.Params.description }}</p>
</header>

<nav>
    <a href="{{ "" | relURL }}"{{ if .IsHome }} class="active"{{ end }}>🏠 首页</a>
    {{ range .Site.Menus.main }}
    <a href="{{ .URL | relURL }}"{{ if eq $.Page.Title .Name }} class="active"{{ end }}>{{ .Name }}</a>
    {{ end }}
    
    {{ if .Site.Params.features.search }}
    <div class="search-box">
        <input type="search" placeholder="🔍 搜索..." id="search-input" onkeyup="searchSite()">
    </div>
    {{ end }}
</nav>

<script>
function searchSite() {
    const query = document.getElementById('search-input').value.trim();
    if (query.length < 2) return;
    
    if (typeof showModal === 'function') {
        showModal();
        displayResults(query);
    } else {
        alert('搜索功能加载中，请稍后...');
    }
}
</script>
