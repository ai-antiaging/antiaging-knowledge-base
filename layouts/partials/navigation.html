<header>
    <h1>{{ .Site.Title }}</h1>
    <p>{{ .Site.Params.description }}</p>
</header>

<nav>
    <a href="{{ "" | relURL }}"{{ if .IsHome }} class="active"{{ end }}>🏠 首页</a>
    {{ range .Site.Menus.main }}
    <a href="{{ .URL | relURL }}"{{ if eq $.Page.Title .Name }} class="active"{{ end }}>{{ .Name }}</a>
    {{ end }}
    
    {{ if .Site.Params.features.search }}
    <div class="search-box">
        <input type="search" placeholder="🔍 搜索..." id="search-input" onkeyup="searchSite()">
    </div>
    {{ end }}
</nav>

<script>
function searchSite() {
    const query = document.getElementById('search-input').value.toLowerCase();
    if (query.length < 2) return;
    
    // Simple client-side search
    const pages = [
        {{ range .Site.Pages }}
        { title: "{{ .Title }}", url: "{{ .Permalink }}", desc: "{{ with .Description }}{{ . }}{{ end }}" },
        {{ end }}
    ];
    
    const results = pages.filter(p => 
        p.title.toLowerCase().includes(query) || 
        p.desc.toLowerCase().includes(query)
    );
    
    if (results.length > 0) {
        console.log('搜索结果:', results);
        // 可以扩展到显示搜索结果模态框
    }
}
</script>
