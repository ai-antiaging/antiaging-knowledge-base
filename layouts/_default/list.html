{{ define "title" }}{{ .Title }} - {{ .Site.Title }}{{ end }}

{{ define "main" }}
<h1>{{ .Title }}</h1>

{{ if .Content }}
<div class="content">
    {{ .Content }}
</div>
{{ end }}

{{ if .Pages }}
<h2 style="margin-top: 40px;">📄 相关页面</h2>
<ul style="list-style: none; padding: 0;">
{{ range .Pages }}
    <li style="padding: 12px 0; border-bottom: 1px solid var(--border);">
        <a href="{{ .Permalink }}" style="font-weight: 500; color: var(--primary);">📖 {{ .Title }}</a>
        {{ with .Description }}
        <p style="color: var(--text-light); font-size: 0.95em; margin: 5px 0 0 25px;">{{ . }}</p>
        {{ end }}
    </li>
{{ end }}
</ul>
{{ end }}
{{ end }}
