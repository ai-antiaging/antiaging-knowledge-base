name: Monitor Drug Repurposing Literature

on:
  schedule:
    - cron: '0 2 1 * *'  # 每月 1 号凌晨 2:00 UTC（北京时间 10:00）
  workflow_dispatch:  # 允许手动触发

jobs:
  monitor-literature:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests
      
      - name: Create data directory
        run: mkdir -p data
      
      - name: Run monitoring script
        id: monitor
        run: |
          python scripts/monitor-drug-repurposing.py
          echo "monitor_completed=true" >> $GITHUB_OUTPUT
      
      - name: Check for changes
        id: git-check
        run: |
          git diff --quiet content/drug-repurposing.md || echo "has_changes=true" >> $GITHUB_OUTPUT
      
      - name: Commit and push changes
        if: steps.git-check.outputs.has_changes == 'true'
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add content/drug-repurposing.md data/
          git commit -m "docs: 自动监控药物再利用文献 $(date +%Y-%m-%d)"
          git push
      
      - name: Create issue if monitoring fails
        if: failure()
        uses: peter-evans/create-issue-from-file@v4
        with:
          title: "⚠️ 药物再利用文献监控失败"
          content-filepath: data/monitor-error.md
          labels: automated, monitoring, drug-repurposing
      
      - name: Upload monitoring report
        uses: actions/upload-artifact@v4
        with:
          name: monitoring-report
          path: data/
