name: Update PubMed Literature

on:
  schedule:
    - cron: '0 0 * * *'  # 每天 00:00 UTC（北京时间 08:00）
  workflow_dispatch:  # 允许手动触发

jobs:
  update-literature:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests
      
      - name: Run PubMed update script
        id: update
        run: |
          python scripts/update-pubmed.py || true
      
      - name: Check for changes
        id: git-check
        run: |
          git diff --quiet content/*.md || echo "has_changes=true" >> $GITHUB_OUTPUT
      
      - name: Commit and push changes
        if: steps.git-check.outputs.has_changes == 'true'
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add content/*.md reports/*.md
          git commit -m "docs: 自动更新 PubMed 文献 $(date +%Y-%m-%d)"
          git push
      
      - name: Create issue if review needed
        if: failure()
        uses: peter-evans/create-issue-from-file@v4
        with:
          title: "⚠️ PubMed 文献更新需要人工审核"
          content-filepath: reports/latest-update-report.md
          labels: automated, literature-update, manual-review-needed
      
      - name: Upload update report
        uses: actions/upload-artifact@v4
        with:
          name: update-report
          path: reports/
