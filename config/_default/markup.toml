# Markdown 渲染配置

[goldmark]
  [goldmark.extensions]
    definitionList = true
    footnote = true
    linkify = true
    strikethrough = true
    table = true
    taskList = true
    typographer = true
    
  [goldmark.extensions.passthrough]
    enable = true
    
    [goldmark.extensions.passthrough.delimiters]
      block = [['\[', '\]'], ['$$', '$$']]
      inline = [['\(', '\)'], ['$', '$']]
  
  [goldmark.parser]
    autoHeadingID = true
    autoHeadingIDType = 'github'
    
    [goldmark.parser.attribute]
      block = true
      title = true
  
  [goldmark.renderer]
    hardWraps = false
    unsafe = true
    xhtml = false

[highlight]
  anchorLineNos = false
  codeFences = true
  guessSyntax = false
  hl_Lines = ''
  hl_inline = false
  lineAnchors = ''
  lineNoStart = 1
  lineNos = false
  lineNumbersInTable = true
  noClasses = true
  noHl = false
  style = 'monokai'
  tabWidth = 4

[tableOfContents]
  endLevel = 3
  ordered = false
  startLevel = 2
